# Change these first
owner: AlexScigalszky # Your GitHub organization or username, where this repository lives
repo: healthcheck # The name of this repository

sites:
  - name: Palabras Aleatorias PWA 
    url: palabrasaleatorias.ar
  - name: Palabras Aleatorias API 
    url: https://palabras-aleatorias-public-api.herokuapp.com/
  - name: Twitter Post
    url: https://palabras-aleatorias-public-api.herokuapp.com/twitter
  - name: Newsletter
    url: https://palabras-aleatorias-public-api.herokuapp.com/newsletter/send

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: demo.upptime.js.org
  baseUrl: /healthcheck
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Alex Health Check reporter
  introTitle: "Alex's apps reporter implemented in a fork of *Upptime* open-source template."
  introMessage: Check online status
  navbar:
    - title: Status Status
      href: /
    - title: Go to repo
      href: https://github.com/$OWNER/$REPO
    - title: Palabras Aleatorias API
      href: https://palabras-aleatorias-public-api.herokuapp.com/
    - title: Palabras Aleatorias PWA
      href: https://palabrasaleatorias.ar
    - title: Heroku
      href: https://dashboard.heroku.com/
    - title: My Profile
      href: https://github.com/$OWNER/
workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "0 */24 * * *"
# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
